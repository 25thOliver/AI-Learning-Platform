services:
  db:
    image: postgres:15
    container_name: ai_learning_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/seed_data.sql:/docker-entrypoint-initdb.d/2-seed.sql
    ports:
      - "5440:5432"

  api:
    build: ./backend
    container_name: ai_learning_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_learning
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # frontend:
  #   build: ./frontend
  #   container_name: ai_learning_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

volumes:
  postgres_data: